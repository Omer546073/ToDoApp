<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTodo — Card Not Found</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --drawer:#22282B; --card:#F2ECDD; --card-edge:#E4DCC6; --ink:#2B2A28; --ink-soft:#65605A;
    --thread:#B5402F; --thread-dark:#8C2F22; --brass:#B79257; --focus:#3A6E63;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%; background:var(--drawer);
    background-image:radial-gradient(ellipse at top, rgba(255,255,255,0.04), transparent 60%);
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono', monospace;
  }
  .card{
    background:var(--card); border-radius:2px; max-width:420px; width:90%;
    box-shadow:0 18px 40px rgba(0,0,0,0.45); padding:40px 36px; text-align:center; position:relative;
  }
  .card::before{
    content:""; position:absolute; top:-7px; left:24px; right:24px; height:14px;
    background-image:radial-gradient(circle, var(--drawer) 4px, transparent 4.5px);
    background-size:18px 18px; background-position:0 0;
  }
  .code{ font-family:'Courier Prime', monospace; font-size:54px; font-weight:700; color:var(--thread); margin:0; }
  h1{ font-family:'Courier Prime', monospace; font-size:18px; color:var(--ink); margin:8px 0 14px; }
  p{ font-size:12.5px; color:var(--ink-soft); line-height:1.7; margin:0 0 24px; }
  a.back{
    display:inline-block; font-size:12px; letter-spacing:1px; text-transform:uppercase;
    color:#fff; background:var(--thread); border:2px solid var(--thread-dark); padding:10px 22px;
    border-radius:2px; text-decoration:none; transform:rotate(-1deg);
  }
  a.back:hover{background:var(--thread-dark);}
</style>
</head>
<body>
  <div class="card">
    <p class="code">404</p>
    <h1>Card not found</h1>
    <p>This entry isn't in the drawer — it may have been deleted, or the call number doesn't exist.</p>
    <a class="back" href="/">Back to catalog</a>
  </div>
</body>
</html>
