<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTodo — Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --drawer:#22282B; --drawer-dark:#1A1F22; --card:#F2ECDD; --card-edge:#E4DCC6;
    --ink:#2B2A28; --ink-soft:#65605A; --thread:#B5402F; --thread-dark:#8C2F22; --brass:#B79257; --focus:#3A6E63;
    --high:#B5402F; --medium:#B79257; --low:#3A6E63;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; background:var(--drawer);
    background-image:radial-gradient(ellipse at top, rgba(255,255,255,0.04), transparent 60%),
      repeating-linear-gradient(90deg, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 1px, transparent 1px, transparent 64px);
    color:var(--ink); font-family:'IBM Plex Sans', sans-serif; min-height:100vh;
  }
  .binder-rail{
    position:fixed; left:0; top:0; bottom:0; width:34px; background:var(--drawer-dark);
    border-right:1px solid rgba(0,0,0,0.4); display:flex; flex-direction:column;
    align-items:center; padding:28px 0; gap:26px; z-index:5;
  }
  .binder-rail .hole{
    width:12px;height:12px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #3a4247, #0c0f10 70%);
    box-shadow:inset 0 1px 2px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.05);
  }
  @media (max-width:640px){ .binder-rail{display:none;} body{padding-left:0 !important;} }
  body{padding-left:34px;}
  .spine{
    background:linear-gradient(180deg, #2A3134, #20262A); border-bottom:2px solid var(--brass);
    padding:0 28px; display:flex; align-items:center; gap:28px; height:56px; position:relative;
  }
  .spine::after{
    content:""; position:absolute; left:0; right:0; bottom:-4px; height:4px;
    background:repeating-linear-gradient(90deg, rgba(0,0,0,0.35) 0 2px, transparent 2px 10px); opacity:0.5;
  }
  .brand{
    font-family:'Courier Prime', monospace; font-weight:700; font-size:18px; color:var(--card);
    letter-spacing:1px; display:flex; align-items:baseline; gap:6px; text-decoration:none;
  }
  .brand .dot{color:var(--thread);}
  .spine nav{ display:flex; gap:22px; flex:1; }
  .spine nav a{
    color:#C9C2B3; text-decoration:none; font-size:13px; letter-spacing:0.4px; padding:6px 2px;
    border-bottom:2px solid transparent; transition:color .15s, border-color .15s;
  }
  .spine nav a:hover{color:var(--card); border-color:var(--brass);}
  .spine nav a[aria-current]{color:var(--card); border-color:var(--thread);}
  main{ max-width:780px; margin:0 auto; padding:48px 24px 80px; }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:2.5px;
    text-transform:uppercase; color:#9AA39E; margin-bottom:10px;
  }
  .eyebrow .thread-dash{color:var(--thread);}
  h1{ font-family:'Courier Prime', monospace; font-size:26px; color:var(--card); margin:0 0 28px; letter-spacing:0.5px; }
  .stat-grid{
    display:grid; grid-template-columns:repeat(3, 1fr); gap:16px; margin-bottom:36px;
  }
  .stat-card{
    background:var(--card); border-radius:2px; padding:22px 18px;
    box-shadow:0 14px 30px rgba(0,0,0,0.35);
    text-align:center;
  }
  .stat-card .num{ font-family:'Courier Prime', monospace; font-size:34px; font-weight:700; color:var(--ink); line-height:1; }
  .stat-card .label{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--ink-soft); margin-top:8px;
  }
  .stat-card.total .num{color:var(--focus);}
  .stat-card.active .num{color:var(--brass);}
  .stat-card.completed .num{color:var(--thread);}
  .breakdown{
    background:var(--card); border-radius:2px; padding:28px 30px;
    box-shadow:0 14px 30px rgba(0,0,0,0.35);
  }
  .breakdown h2{ font-family:'Courier Prime', monospace; font-size:17px; margin:0 0 18px; }
  .bar-row{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .bar-row:last-child{margin-bottom:0;}
  .bar-row .tag{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.5px; text-transform:uppercase;
    width:64px; flex-shrink:0; color:var(--ink-soft);
  }
  .bar-track{
    flex:1; height:10px; background:var(--card-edge); border-radius:6px; overflow:hidden;
  }
  .bar-fill{ height:100%; border-radius:6px; }
  .bar-fill.high{background:var(--high);}
  .bar-fill.medium{background:var(--medium);}
  .bar-fill.low{background:var(--low);}
  .bar-row .count{
    font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--ink); width:20px; text-align:right; flex-shrink:0;
  }
  footer{ text-align:center; font-family:'IBM Plex Mono', monospace; font-size:11px; color:#6E756F; padding:30px 0 10px; }
  @media (max-width:560px){
    .stat-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

  <div class="binder-rail" aria-hidden="true">
    <div class="hole"></div><div class="hole"></div><div class="hole"></div>
    <div class="hole"></div><div class="hole"></div><div class="hole"></div>
    <div class="hole"></div><div class="hole"></div>
  </div>

  <header class="spine">
    <a class="brand" href="/">MyTodo<span class="dot">.</span></a>
    <nav>
      <a href="/">Home</a>
      <a href="/stats" aria-current="page">Stats</a>
      <a href="/about">About</a>
    </nav>
  </header>

  <main>
    <div class="eyebrow"><span class="thread-dash">—</span> Drawer summary</div>
    <h1>Catalog Stats</h1>

    <div class="stat-grid">
      <div class="stat-card total">
        <div class="num">{{ total }}</div>
        <div class="label">Total cards</div>
      </div>
      <div class="stat-card active">
        <div class="num">{{ active }}</div>
        <div class="label">Active</div>
      </div>
      <div class="stat-card completed">
        <div class="num">{{ completed }}</div>
        <div class="label">Completed</div>
      </div>
    </div>

    <div class="breakdown">
      <h2>By priority</h2>
      {% set max_count = [high, medium, low, 1]|max %}
      <div class="bar-row">
        <span class="tag">High</span>
        <div class="bar-track"><div class="bar-fill high" style="width: {{ (high / max_count * 100)|round }}%;"></div></div>
        <span class="count">{{ high }}</span>
      </div>
      <div class="bar-row">
        <span class="tag">Medium</span>
        <div class="bar-track"><div class="bar-fill medium" style="width: {{ (medium / max_count * 100)|round }}%;"></div></div>
        <span class="count">{{ medium }}</span>
      </div>
      <div class="bar-row">
        <span class="tag">Low</span>
        <div class="bar-track"><div class="bar-fill low" style="width: {{ (low / max_count * 100)|round }}%;"></div></div>
        <span class="count">{{ low }}</span>
      </div>
    </div>

    <footer>Drawer A — counted as of last refresh</footer>
  </main>

</body>
</html>
